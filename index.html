    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-stroke: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --main-img-size: 100px;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0a0f1e;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(76, 29, 149, 0.3) 0%, transparent 50%);
            background-attachment: fixed;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
            padding: 30px 20px;
            box-sizing: border-box;
            perspective: 800px;
        }

        .profile-img-container {
            margin-bottom: 15px;
        }

        #mainProfileImg {
            width: var(--main-img-size);
            height: var(--main-img-size);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-stroke);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2em;
            margin: 0 0 5px 0;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .desc {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            font-size: 1em;
            line-height: 1.4;
            padding: 0 15px;
        }

        .btn-link { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1em;
            border-radius: 14px;
            padding: 12px 0;
            width: 100%;
            margin-bottom: 12px;
            text-decoration: none;
            color: #fff;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-stroke);
            transition: all 0.3s ease;
            box-sizing: border-box; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .btn-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-link:active {
            transform: scale(0.98);
        }

        .btn-link i {
            font-size: 1.2em;
        }

        .split-button-container {
            display: flex;
            width: 100%;
            gap: 12px;
        }

        .split-button-container .btn-link {
            width: 50%;
        }

        .telegram-btn i { color: #0088cc; }
        .youtube-btn i { color: #ff0000; }
        .github-btn i { color: #ffffff; }
        .podcast-btn i { color: #a855f7; }
        .tiktok-btn i { color: #ffffff; }
        .instagram-btn i { color: #f43f5e; }
    </style>

    </section>
